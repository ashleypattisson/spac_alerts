name: SPAC Alerts

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

concurrency:
  group: spac-alerts
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run SPAC monitor
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          SEC_EMAIL: ${{ secrets.SEC_EMAIL }}
        run: python spac_alerts.py

      - name: Save updated state back to repo
        run: |
          git config user.name "spac-alerts-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_filings.json
          if git diff --staged --quiet; then
            echo "No state change to commit."
          else
            git commit -m "Update seen filings [skip ci]"
            git push
          fi
